name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-build:
    name: Test and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: abstractobserver
    steps:
      - name: Check out AbstractObserver
        uses: actions/checkout@v4
        with:
          path: abstractobserver

      - name: Check out AbstractUIC
        uses: actions/checkout@v4
        with:
          repository: lpalbou/AbstractUIC
          path: abstractuic

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: abstractobserver/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Validate npm package contents
        run: npm pack --dry-run
